<script>
  (function () {
    var storageKey = "stateless-theme";
    var root = document.documentElement;
    var stored = null;

    try {
      stored = localStorage.getItem(storageKey);
    } catch (error) {
      stored = null;
    }

    var theme = stored || "light";

    root.setAttribute("data-theme", theme);
  })();
</script>
