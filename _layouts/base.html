<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  {%- include head.html -%}
  <body class="site-shell page-entering">
    <div class="theme-splash" aria-hidden="true">
      <svg class="theme-splash-blot theme-splash-blot-a" viewBox="0 0 260 210" aria-hidden="true" style="opacity:0">
        <defs>
          <linearGradient id="theme-splash-fill-a" x1="0%" y1="8%" x2="84%" y2="92%">
            <stop offset="0%" stop-color="var(--accent)"/>
            <stop offset="58%" stop-color="var(--accent-strong)"/>
            <stop offset="100%" stop-color="#1f261f" stop-opacity="0.96"/>
          </linearGradient>
        </defs>
        <path class="theme-splash-body" d="M126 14c19-3 36 9 46 26 23-9 51-5 69 13 17 16 24 41 20 65-4 21-18 39-36 49-12 7-26 10-40 10-8 14-21 25-38 29-28 7-60-3-78-24-24-1-47-15-58-39-11-24-8-54 9-73 13-15 32-23 52-22 10-18 28-31 54-34Z"/>
        <path class="theme-splash-shadow" d="M168 44c17-6 36-1 49 12 16 15 20 41 8 60-14 22-43 27-67 24 9-7 16-16 18-28 4-20-4-45-8-68Z"/>
        <path class="theme-splash-gloss" d="M102 42c13-18 44-25 68-14-24 4-40 14-52 31-11 15-15 31-16 43-10-23-10-42 0-60Z"/>
        <circle class="theme-splash-speck" cx="219" cy="34" r="10"/>
        <circle class="theme-splash-speck" cx="236" cy="64" r="6"/>
        <circle class="theme-splash-speck" cx="208" cy="150" r="8"/>
        <circle class="theme-splash-speck" cx="224" cy="176" r="4"/>
        <circle class="theme-splash-speck" cx="32" cy="122" r="7"/>
        <circle class="theme-splash-speck" cx="60" cy="186" r="5"/>
      </svg>
      <svg class="theme-splash-blot theme-splash-blot-b" viewBox="0 0 220 180" aria-hidden="true" style="opacity:0">
        <defs>
          <linearGradient id="theme-splash-fill-b" x1="6%" y1="10%" x2="88%" y2="94%">
            <stop offset="0%" stop-color="var(--accent)"/>
            <stop offset="54%" stop-color="var(--accent-strong)"/>
            <stop offset="100%" stop-color="#1f261f" stop-opacity="0.92"/>
          </linearGradient>
        </defs>
        <path class="theme-splash-body" d="M110 10c15 0 30 10 40 23 21-5 43 2 56 17 13 15 16 38 8 57-8 18-26 31-46 35-11 2-22 2-32-1-11 16-28 27-48 27-23 1-46-12-58-33-20-4-37-18-42-39-6-22 2-47 21-60 13-9 29-12 45-9C65 16 85 10 110 10Z"/>
        <path class="theme-splash-shadow" d="M143 39c14-6 31-3 43 8 17 15 20 42 4 59-11 12-28 16-44 14 18-15 21-44 8-81Z"/>
        <path class="theme-splash-gloss" d="M80 36c10-12 29-20 49-16-18 6-31 16-39 29-7 11-10 23-11 33-9-16-9-31 1-46Z"/>
        <circle class="theme-splash-speck" cx="194" cy="34" r="7"/>
        <circle class="theme-splash-speck" cx="202" cy="94" r="5"/>
        <circle class="theme-splash-speck" cx="188" cy="142" r="6"/>
        <circle class="theme-splash-speck" cx="34" cy="114" r="5"/>
        <circle class="theme-splash-speck" cx="62" cy="154" r="4"/>
      </svg>
    </div>
    <div class="page-machine" aria-hidden="true">
      <span class="page-mask"></span>
      <span class="machine-edge machine-edge-a"></span>
      <span class="machine-edge machine-edge-b"></span>
      <span class="machine-edge machine-edge-c"></span>
      <span class="machine-edge machine-edge-d"></span>
      <span class="machine-edge machine-edge-e"></span>
      <span class="machine-node machine-node-a"></span>
      <span class="machine-node machine-node-b"></span>
      <span class="machine-node machine-node-c"></span>
      <span class="machine-node machine-node-d"></span>
      <span class="machine-node machine-node-e"></span>
    </div>
    {%- include header.html -%}
    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>
    {%- include footer.html -%}
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
