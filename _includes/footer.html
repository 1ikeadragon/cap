<footer class="site-footer h-card">
  <data class="u-url" value="{{ '/' | relative_url }}"></data>

  <div class="wrapper footer-shell">
    {%- if site.author and site.author.email -%}
      <a class="footer-email u-email" href="mailto:{{ site.author.email }}">{{ site.author.email }}</a>
    {%- endif -%}

    {%- for entry in site.minima.social_links -%}
      <a class="footer-link footer-link-{{ entry.icon | replace: 'x-twitter', 'x' }}" rel="me" href="{{ entry.url }}" target="_blank" aria-label="{{ entry.title }}">
        <span class="visually-hidden">{{ entry.title }}</span>
        {%- if entry.icon == 'x-twitter' -%}
          <svg class="footer-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18.901 2H21.95l-6.66 7.612L23.12 22h-6.132l-4.804-6.28L6.69 22H3.638l7.122-8.142L1.25 2H7.54l4.343 5.73L18.901 2zm-1.072 18.17h1.689L6.622 3.735H4.81L17.829 20.17z"/>
          </svg>
        {%- elsif entry.icon == 'github' -%}
          <svg class="footer-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56 0-.28-.01-1.21-.02-2.2-3.2.7-3.88-1.36-3.88-1.36-.52-1.33-1.28-1.68-1.28-1.68-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.23-1.28-5.23-5.69 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.47.11-3.06 0 0 .97-.31 3.17 1.18a10.9 10.9 0 0 1 5.77 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.77.11 3.06.74.81 1.19 1.84 1.19 3.1 0 4.42-2.69 5.39-5.26 5.67.41.36.78 1.08.78 2.18 0 1.57-.01 2.84-.01 3.22 0 .31.21.68.8.56A11.51 11.51 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5z"/>
          </svg>
        {%- endif -%}
      </a>
    {%- endfor -%}
  </div>
</footer>
