<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  {%- include head.html -%}
  <body class="site-shell page-entering">
    <div class="theme-splash" aria-hidden="true">
      <div class="theme-radiance theme-radiance-back"></div>
      <div class="theme-diffusion">
        <span class="theme-diffusion-layer theme-diffusion-layer-a"></span>
        <span class="theme-diffusion-layer theme-diffusion-layer-b"></span>
        <span class="theme-diffusion-layer theme-diffusion-layer-c"></span>
      </div>
      <div class="theme-beams">
        <span class="theme-beam theme-beam-a"></span>
        <span class="theme-beam theme-beam-b"></span>
        <span class="theme-beam theme-beam-c"></span>
      </div>
      <div class="theme-meridian">
        <span class="theme-meridian-line theme-meridian-line-a"></span>
        <span class="theme-meridian-line theme-meridian-line-b"></span>
      </div>
      <div class="theme-radiance theme-radiance-front"></div>
    </div>
    <div class="theme-stars" aria-hidden="true">
      <span class="theme-stars-layer theme-stars-layer-near"></span>
      <span class="theme-stars-layer theme-stars-layer-mid"></span>
      <span class="theme-stars-layer theme-stars-layer-far"></span>
    </div>
    <div class="page-machine" aria-hidden="true">
      <span class="page-mask"></span>
      <svg class="machine-svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <defs>
          <marker id="fsm-arrow" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto">
            <path class="fsm-marker" d="M 0 0.5 L 5.5 3.5 L 0 6.5 Z"/>
          </marker>
        </defs>
        <!-- edges (beneath nodes) — endpoints trimmed to node circumference -->
        <line class="fsm-edge fsm-edge-ab" x1="125" y1="243" x2="271" y2="154" marker-end="url(#fsm-arrow)"/>
        <line class="fsm-edge fsm-edge-ad" x1="125" y1="261" x2="287" y2="361" marker-end="url(#fsm-arrow)"/>
        <line class="fsm-edge fsm-edge-bc" x1="305" y1="137" x2="457" y2="89" marker-end="url(#fsm-arrow)"/>
        <line class="fsm-edge fsm-edge-be" x1="303" y1="151" x2="493" y2="285" marker-end="url(#fsm-arrow)"/>
        <line class="fsm-edge fsm-edge-de" x1="319" y1="367" x2="490" y2="306" marker-end="url(#fsm-arrow)"/>
        <line class="fsm-edge fsm-edge-cf" x1="492" y1="90" x2="667" y2="190" marker-end="url(#fsm-arrow)"/>
        <path class="fsm-edge fsm-edge-ef" d="M 529 296 L 667 214" marker-end="url(#fsm-arrow)"/>
        <!-- nodes (above edges) -->
        <circle class="fsm-node fsm-node-a" cx="110" cy="252" r="18"/>
        <circle class="fsm-node fsm-node-b" cx="290" cy="142" r="16"/>
        <circle class="fsm-node fsm-node-c" cx="478" cy="82" r="16"/>
        <circle class="fsm-node fsm-node-d" cx="305" cy="372" r="15"/>
        <circle class="fsm-node fsm-node-e" cx="512" cy="298" r="17"/>
        <circle class="fsm-node fsm-node-f" cx="688" cy="202" r="18"/>
      </svg>
    </div>
    {%- include header.html -%}
    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>
    {%- include footer.html -%}
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
