<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  {%- include head.html -%}
  <body class="site-shell">
    <div class="theme-transition" aria-hidden="true">
      <span class="theme-drop theme-drop-a"></span>
      <span class="theme-drop theme-drop-b"></span>
      <span class="theme-drop theme-drop-c"></span>
      <span class="theme-drop theme-drop-d"></span>
      <span class="theme-wash"></span>
    </div>
    {%- include header.html -%}
    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>
    {%- include footer.html -%}
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
