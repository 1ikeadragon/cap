<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  {%- include head.html -%}
  <body class="site-shell page-entering">
    <div class="theme-splash" aria-hidden="true">
      <div class="theme-radiance theme-radiance-back"></div>
      <div class="theme-diffusion">
        <span class="theme-diffusion-layer theme-diffusion-layer-a"></span>
        <span class="theme-diffusion-layer theme-diffusion-layer-b"></span>
        <span class="theme-diffusion-layer theme-diffusion-layer-c"></span>
      </div>
      <div class="theme-beams">
        <span class="theme-beam theme-beam-a"></span>
        <span class="theme-beam theme-beam-b"></span>
        <span class="theme-beam theme-beam-c"></span>
      </div>
      <div class="theme-meridian">
        <span class="theme-meridian-line theme-meridian-line-a"></span>
        <span class="theme-meridian-line theme-meridian-line-b"></span>
      </div>
      <div class="theme-radiance theme-radiance-front"></div>
    </div>
    <div class="theme-stars" aria-hidden="true">
      <span class="theme-stars-layer theme-stars-layer-near"></span>
      <span class="theme-stars-layer theme-stars-layer-mid"></span>
      <span class="theme-stars-layer theme-stars-layer-far"></span>
    </div>
    <div class="page-machine" aria-hidden="true">
      <span class="page-mask"></span>
      <svg class="machine-svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <line class="fsm-edge fsm-edge-ab" x1="125" y1="243" x2="271" y2="154"/>
        <line class="fsm-edge fsm-edge-ad" x1="125" y1="261" x2="287" y2="361"/>
        <line class="fsm-edge fsm-edge-bc" x1="305" y1="137" x2="457" y2="89"/>
        <line class="fsm-edge fsm-edge-be" x1="303" y1="151" x2="493" y2="285"/>
        <line class="fsm-edge fsm-edge-de" x1="319" y1="367" x2="490" y2="306"/>
        <line class="fsm-edge fsm-edge-cf" x1="492" y1="90" x2="667" y2="190"/>
        <path class="fsm-edge fsm-edge-ef" d="M 528.9 297 L 667 214"/>
        <path class="fsm-arrowhead fsm-arrowhead-ab" d="M -8 -4.2 L 0 0 L -8 4.2 Z" transform="translate(271 154) rotate(-31)"/>
        <path class="fsm-arrowhead fsm-arrowhead-ad" d="M -8 -4.2 L 0 0 L -8 4.2 Z" transform="translate(287 361) rotate(32)"/>
        <path class="fsm-arrowhead fsm-arrowhead-bc" d="M -8 -4.2 L 0 0 L -8 4.2 Z" transform="translate(457 89) rotate(-18)"/>
        <path class="fsm-arrowhead fsm-arrowhead-be" d="M -8 -4.2 L 0 0 L -8 4.2 Z" transform="translate(493 285) rotate(35)"/>
        <path class="fsm-arrowhead fsm-arrowhead-de" d="M -8 -4.2 L 0 0 L -8 4.2 Z" transform="translate(490 306) rotate(-20)"/>
        <path class="fsm-arrowhead fsm-arrowhead-cf" d="M -8 -4.2 L 0 0 L -8 4.2 Z" transform="translate(667 190) rotate(30)"/>
        <path class="fsm-arrowhead fsm-arrowhead-ef" d="M -8 -4.2 L 0 0 L -8 4.2 Z" transform="translate(667 214) rotate(-31)"/>
        <!-- nodes (above edges) -->
        <circle class="fsm-node fsm-node-a" cx="110" cy="252" r="18"/>
        <circle class="fsm-node fsm-node-b" cx="290" cy="142" r="16"/>
        <circle class="fsm-node fsm-node-c" cx="478" cy="82" r="16"/>
        <circle class="fsm-node fsm-node-d" cx="305" cy="372" r="15"/>
        <circle class="fsm-node fsm-node-e" cx="512" cy="298" r="17"/>
        <circle class="fsm-node fsm-node-f" cx="688" cy="202" r="18"/>
      </svg>
    </div>
    {%- include header.html -%}
    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>
    {%- include footer.html -%}
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
