<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  {%- include head.html -%}
  <body class="site-shell page-entering">
    <div class="theme-splash" aria-hidden="true">
      <svg class="theme-burst theme-burst-a" viewBox="0 0 210 130" aria-hidden="true" style="opacity:0">
        <path class="theme-burst-line" d="M20 94 76 38 124 54 176 18"/>
        <path class="theme-burst-line theme-burst-line-secondary" d="M76 38 106 92 166 110"/>
        <circle class="theme-burst-node theme-burst-node-a" cx="20" cy="94" r="9"/>
        <circle class="theme-burst-node theme-burst-node-b" cx="76" cy="38" r="7"/>
        <circle class="theme-burst-node theme-burst-node-c" cx="124" cy="54" r="5.5"/>
        <circle class="theme-burst-node theme-burst-node-d" cx="176" cy="18" r="8"/>
        <circle class="theme-burst-node theme-burst-node-e" cx="106" cy="92" r="6.5"/>
        <circle class="theme-burst-node theme-burst-node-f" cx="166" cy="110" r="7.5"/>
      </svg>
      <svg class="theme-burst theme-burst-b" viewBox="0 0 170 120" aria-hidden="true" style="opacity:0">
        <path class="theme-burst-line" d="M18 26 68 16 106 54 148 42"/>
        <path class="theme-burst-line theme-burst-line-secondary" d="M68 16 62 86 122 96"/>
        <circle class="theme-burst-node theme-burst-node-a" cx="18" cy="26" r="6.5"/>
        <circle class="theme-burst-node theme-burst-node-b" cx="68" cy="16" r="7.5"/>
        <circle class="theme-burst-node theme-burst-node-c" cx="106" cy="54" r="6"/>
        <circle class="theme-burst-node theme-burst-node-d" cx="148" cy="42" r="5.5"/>
        <circle class="theme-burst-node theme-burst-node-e" cx="62" cy="86" r="8"/>
        <circle class="theme-burst-node theme-burst-node-f" cx="122" cy="96" r="6.5"/>
      </svg>
    </div>
    <div class="page-machine" aria-hidden="true">
      <span class="page-mask"></span>
      <svg class="machine-svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <defs>
          <marker id="fsm-arrow" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto">
            <path class="fsm-marker" d="M 0 0.5 L 5.5 3.5 L 0 6.5 Z"/>
          </marker>
        </defs>
        <!-- edges (beneath nodes) — endpoints trimmed to node circumference -->
        <line class="fsm-edge fsm-edge-ab" x1="125" y1="243" x2="271" y2="154" marker-end="url(#fsm-arrow)"/>
        <line class="fsm-edge fsm-edge-ad" x1="125" y1="261" x2="287" y2="361" marker-end="url(#fsm-arrow)"/>
        <line class="fsm-edge fsm-edge-bc" x1="305" y1="137" x2="457" y2="89" marker-end="url(#fsm-arrow)"/>
        <line class="fsm-edge fsm-edge-be" x1="303" y1="151" x2="493" y2="285" marker-end="url(#fsm-arrow)"/>
        <line class="fsm-edge fsm-edge-de" x1="319" y1="367" x2="490" y2="306" marker-end="url(#fsm-arrow)"/>
        <line class="fsm-edge fsm-edge-cf" x1="492" y1="90" x2="667" y2="190" marker-end="url(#fsm-arrow)"/>
        <path class="fsm-edge fsm-edge-ef" d="M 527 290 L 667 214" marker-end="url(#fsm-arrow)"/>
        <!-- nodes (above edges) -->
        <circle class="fsm-node fsm-node-a" cx="110" cy="252" r="18"/>
        <circle class="fsm-node fsm-node-b" cx="290" cy="142" r="16"/>
        <circle class="fsm-node fsm-node-c" cx="478" cy="82" r="16"/>
        <circle class="fsm-node fsm-node-d" cx="305" cy="372" r="15"/>
        <circle class="fsm-node fsm-node-e" cx="512" cy="298" r="17"/>
        <circle class="fsm-node fsm-node-f" cx="688" cy="202" r="18"/>
      </svg>
    </div>
    {%- include header.html -%}
    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>
    {%- include footer.html -%}
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
